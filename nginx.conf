# ============================================
# World Monitor - Nginx 反向代理配置
# 阿里云轻量应用服务器部署
# ============================================
# 
# 安装 Nginx:
#   sudo apt update
#   sudo apt install nginx
#
# 复制配置文件:
#   sudo cp nginx.conf /etc/nginx/sites-available/worldmonitor
#   sudo ln -s /etc/nginx/sites-available/worldmonitor /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl restart nginx
#
# ============================================

# 上游服务器配置
upstream worldmonitor_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP 服务器
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 接受所有域名/IP

    # 访问日志
    access_log /var/log/nginx/worldmonitor-access.log;
    error_log /var/log/nginx/worldmonitor-error.log;

    # 客户端请求限制
    client_max_body_size 50M;
    client_body_buffer_size 1M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://worldmonitor_backend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, immutable";
        expires 7d;
    }

    # API 请求代理
    location /api/ {
        proxy_pass http://worldmonitor_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 支持
    location /ws {
        proxy_pass http://worldmonitor_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 主应用代理
    location / {
        proxy_pass http://worldmonitor_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
